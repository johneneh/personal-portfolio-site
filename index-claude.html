<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style-claude.css">
</head>
<body>
    <!-- ============================================================
    1.0 - STARFIELD BACKGROUND LAYERS
    These divs create the animated space background.
    They sit fixed behind all page content (z-index: 0).
    You do not need to touch these — they run automatically.
  ============================================================ -->
  <div class="nebula"        aria-hidden="true"></div>
  <div class="stars-small"   aria-hidden="true"></div>
  <div class="stars-medium"  aria-hidden="true"></div>
  <div class="stars-large"   aria-hidden="true"></div>
  <div class="stars-twinkle" aria-hidden="true"></div>
  <div class="shooting-star" aria-hidden="true"></div>
  <div class="shooting-star" aria-hidden="true"></div>

  <!-- ============================================================
    1.1 - NAVIGATION BAR
    Sticky top bar — stays visible as the user scrolls.
    Structure:
      .nav            → the sticky wrapper bar
      .nav__inner     → flex row: logo left, links right
      .nav__logo      → logo placeholder (replace with your logo)
      .nav__toggle    → hamburger button (mobile only)
      .nav__links     → Home, About, Projects, Contact
  ============================================================ -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav__inner">

      <!-- 1.2 - LOGO PLACEHOLDER
           This dashed box marks where your logo will go.
           To replace it: delete the <div class="nav__logo"> and
           paste in your own <img src="yourlogo.png" alt="Your Name">
           or any custom HTML/SVG logo you have. -->
      <a href="#home" class="nav__logo" aria-label="Go to homepage">
        <span>Your Logo</span>
      </a>

      <!-- 1.3 - HAMBURGER BUTTON (visible on mobile only)
           Clicking/focusing this button opens the nav menu
           via the CSS :focus-within trick — no JavaScript needed -->
      <button
        class="nav__toggle"
        aria-label="Open navigation menu"
      >
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>

      <!-- 1.4 - NAVIGATION LINKS
           class="active" highlights the current page link.
           Move it to whichever link matches where the user is. -->
      <ul class="nav__links" role="list">
        <li><a href="#home"     class="active">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>

    </div>
  </nav>
</body>
</html>
