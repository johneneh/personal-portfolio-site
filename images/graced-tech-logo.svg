<svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gracedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#7b2cbf;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff006e;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <circle cx="30" cy="90" r="6" fill="#00d4ff" filter="url(#nodeGlow)" opacity="0.9"/>
    <line x1="36" y1="90" x2="60" y2="90" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
    <circle cx="370" cy="90" r="6" fill="#00d4ff" filter="url(#nodeGlow)" opacity="0.9"/>
    <line x1="340" y1="90" x2="364" y2="90" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>

    <path d="M 70 70 L 60 70 L 60 110 L 70 110" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 330 70 L 340 70 L 340 110 L 330 110" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>

    <text x="200" y="85" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900" letter-spacing="10" fill="url(#gracedGradient)" filter="url(#glow)">GRACED</text>

    <line x1="120" y1="105" x2="280" y2="105" stroke="url(#gracedGradient)" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>

    <text x="200" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="300" letter-spacing="14" fill="rgba(255,255,255,0.7)">TECH</text>

    <circle cx="100" cy="105" r="2" fill="#00d4ff" opacity="0.5"/>
    <circle cx="300" cy="105" r="2" fill="#ff006e" opacity="0.5"/>
</svg>